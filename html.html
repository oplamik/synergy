<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Стильный счетчик</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="counter-card">
            <h1 class="title">Счетчик</h1>
            
            <div class="counter-display" id="counterDisplay">0</div>
            
            <div class="message-display" id="messageDisplay"></div>
            
            <div class="button-group">
                <button class="counter-btn minus-btn" id="minusBtn">−</button>
                <button class="counter-btn plus-btn" id="plusBtn">+</button>
            </div>
        </div>
    </div>
    
    <script src="script.js"></script>
</body>
</html>
